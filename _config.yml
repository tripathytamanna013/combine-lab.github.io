# https://jekyllrb.com/docs/configuration/

# site-wide variables
title: Rayala Lab # title of site, used in tab name and elsewhere
email: oncolab317@gmail.com # default email
google: Suresh Kumar Rayala # default name to search on Google Scholar
github: tripathytamanna013, PSAdimoolam # default GitHub user/org, without the @
linkedin: your-linkedin-username
orcid: 0000-0000-0000-0000
researchgate: Your-Profile-Name
wikipedia: Your_Page_Name
irins: your-irins-id
# base directory where site is hosted
# set to "" if hosting at a custom domain, eg yoursite.com
baseurl: "/"

# default front matter parameters for markdown files
# defaults can be overridden on a particular page, eg:
# ---
# description: Description unique to this page
# background: images/different-bg-for-this-page.jpg
# ---
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      description: An easy-to-use, flexible website template for labs, with automatic citations, GitHub tag imports, pre-built components, and more. # description that will show under search engine results
      background: images/test-tube.jpg # background image in header and footer
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post
  # markdown files in /newsposts
  - scope:
      path: "newsposts"
    values:
      layout: post
  - scope:
      path: "assets/cv"
    values:
      layout: default
collections:
  members:
    output: true

# sass settings
sass:
  sass_dir: css

# syntax highlighting
highlighter: rouge

# build settings
plugins:
  - jekyll-feed
  - jekyll-redirect-from
